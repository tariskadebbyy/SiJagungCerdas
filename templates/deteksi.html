<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deteksi Penyakit Jagung | SiJagungCerdas</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <img src="{{ url_for('static', filename='assets/logo-corn.png') }}" alt="Logo Jagung">
    <h1>SiJagungCerdas</h1>
  </div>

  <!-- HAMBURGER -->
  <div class="menu-toggle" id="mobile-menu">
    <span class="bar"></span>
    <span class="bar"></span>
    <span class="bar"></span>
  </div>

  <!-- NAV MENU -->
  <nav class="nav-menu">
    <a href="{{ url_for('index') }}">Beranda</a>
    <a href="{{ url_for('deteksi') }}" class="active">Deteksi</a>
    <a href="{{ url_for('edukasi') }}">Edukasi</a>
    <a href="{{ url_for('tentang') }}">Tentang</a>
  </nav>
</header>

<!-- DETEKSI -->
<section class="deteksi">
  <div class="container">

    <h2>Deteksi Penyakit Jagung</h2>
    <p>Pilih metode untuk mengambil gambar daun jagung.</p>

    <!-- INPUT -->
    <div class="input-group">

      <label class="upload-label">
        📁 Upload dari Galeri
        <input type="file" id="uploadGallery" accept="image/*">
      </label>

      <label class="upload-label">
        📷 Gunakan Kamera
        <input type="file" id="openCamera" accept="image/*" capture="environment">
      </label>

    </div>

    <!-- PREVIEW -->
    <img id="previewImage" style="display:none;">

    <!-- BUTTON -->
    <button class="btn" onclick="predict()">🔍 Mulai Analisis</button>

    <!-- HASIL -->
    <div id="resultBox" class="result-box" style="display:none;">
      <h3>Hasil Deteksi</h3>
      <p id="diseaseName"></p>
      <p id="confidence"></p>
    </div>

  </div>
</section>

<!-- FOOTER -->
<footer>
  <p>&copy; 2026 SiJagungCerdas</p>
</footer>

<!-- SCRIPT -->
<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
